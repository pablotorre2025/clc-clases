<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Flyer Digital - Academia Bíblica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    .font-lora { font-family: 'Lora', serif; }
    #btn-edit { opacity: 0.15; transition: opacity 0.3s; }
    #btn-edit:hover { opacity: 0.6; }
    #hero-section {
      flex: 0 0 55vh;
      min-height: 320px;
      max-height: 620px;
      overflow: hidden;
      position: relative;
    }
    #flyer-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      cursor: zoom-in;
    }
    #hero-overlay-button {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 2;
      background: rgba(255, 255, 255, 0.88);
      color: #1e3a8a;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #hero-overlay-button {
      display: none;
    }
    #hero-overlay-button:active {
      transform: scale(0.98);
    }
    #directions-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    #directions-link:active {
      transform: scale(0.99);
    }
    @media (max-width: 640px) {
      #hero-section {
        flex-basis: 44vh;
        min-height: 280px;
        margin-top: calc(env(safe-area-inset-top, 0px) + 0px);
      }
      #flyer-image[data-day="martes"] {
        object-position: center 4%;
      }
      #flyer-image[data-day="viernes"] {
        object-position: center 8%;
      }
      #flyer-image[data-day="domingo"] {
        object-position: center 6%;
      }
    }
    @media (min-width: 641px) and (max-width: 1024px) {
      #hero-section {
        flex-basis: 52vh;
      }
      #flyer-image[data-day="martes"] {
        object-position: center 28%;
      }
      #flyer-image[data-day="viernes"] {
        object-position: center 32%;
      }
      #flyer-image[data-day="domingo"] {
        object-position: center 30%;
      }
    }
    @media (min-width: 1025px) {
      #hero-section {
        flex-basis: 58vh;
      }
      #flyer-image[data-day="martes"] {
        object-position: center 35%;
      }
      #flyer-image[data-day="viernes"] {
        object-position: center 38%;
      }
      #flyer-image[data-day="domingo"] {
        object-position: center 34%;
      }
    }
  </style>
</head>
<body class="bg-gray-100" style="height:100vh; display:flex; flex-direction:column;">

  <!-- Botón de idioma -->
  <div class="fixed top-4 right-4 z-20">
    <button id="language-switch" class="bg-white/80 backdrop-blur text-blue-900 text-sm font-semibold px-3 py-1 rounded-full shadow">
      EN / ES
    </button>
  </div>

  <!-- Botón de edición (esquina superior izquierda) -->
  <div class="fixed top-4 left-4 z-20">
    <button id="btn-edit" class="bg-blue-800 text-white text-xs px-3 py-2 rounded-full shadow-lg">✏️ Editar</button>
  </div>

  <!-- SECCIÓN IMAGEN -->
  <div id="hero-section">
    <img id="flyer-image"
         src="https://pablotorre2025.github.io/clc-clases/assets/f1.png"
         alt="Evento"
         style="display:block;">
    <button id="hero-overlay-button" type="button">Ver imagen completa</button>
    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);"></div>
  </div>

  <!-- SECCIÓN INFORMACIÓN -->
  <div class="flex flex-col px-6 py-4 bg-gray-100" style="flex: 1; overflow-y: auto;">

    <!-- Tabs de día -->
    <div class="flex gap-2 mb-4">
      <button data-day="martes"  class="day-tab flex-1 py-1.5 rounded-full text-sm font-semibold transition-all bg-blue-700 text-white">Martes</button>
      <button data-day="viernes" class="day-tab flex-1 py-1.5 rounded-full text-sm font-semibold transition-all bg-gray-200 text-gray-600">Viernes</button>
      <button data-day="domingo" class="day-tab flex-1 py-1.5 rounded-full text-sm font-semibold transition-all bg-gray-200 text-gray-600">Domingo</button>
    </div>

    <h1 id="flyer-title" class="font-lora text-3xl font-bold text-blue-950 mb-1 text-center"></h1>
    <p id="flyer-subtitle" class="text-blue-700 font-semibold text-lg mb-3 text-center"></p>

    <!-- Horario dinámico -->
    <div id="schedule-container" class="mb-3 space-y-2"></div>

    <!-- Fecha -->
    <div class="flex items-center mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
      </svg>
      <span id="flyer-date" class="ml-3 text-gray-700 text-xl font-medium"></span>
    </div>

    <a id="directions-link" href="https://www.google.com/maps/search/?api=1&query=404%20W.%20Wilshire%20Avenue%2C%20Fullerton%2C%20CA%2092832"
       target="_blank" rel="noopener noreferrer"
       class="bg-white/80 rounded-2xl p-4 shadow-sm border border-blue-100 mb-1">
      <div class="flex items-start gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:22px;height:22px;flex-shrink:0; margin-top:2px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
        </svg>
        <div>
          <p class="text-blue-800 font-semibold text-base">Cómo llegar</p>
          <p id="flyer-address" class="text-gray-700 text-sm leading-snug">404 W. Wilshire Avenue; Fullerton, CA 92832</p>
        </div>
      </div>
    </a>

    <a id="flyer-button" href="index.html"
       class="block text-center bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-6 rounded-2xl text-base shadow-md active:scale-95 transition-all mb-15">
      Ir a la Clase ahora
    </a>
  </div>

  <!-- MODAL: Contraseña -->
  <div id="modal-password" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center;" class="flex">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-80">
      <h2 class="font-lora text-xl font-bold text-blue-950 mb-4">Acceso de edición</h2>
      <input id="input-password" type="password" placeholder="Contraseña"
             class="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-800 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p id="pw-error" class="text-red-500 text-sm mb-3" style="display:none;">Contraseña incorrecta</p>
      <div class="flex gap-2">
        <button id="btn-pw-cancel" class="flex-1 bg-gray-200 text-gray-700 rounded-lg py-2 text-sm">Cancelar</button>
        <button id="btn-pw-ok" class="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm font-semibold">Entrar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Formulario de edición -->
  <div id="modal-form" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center;" class="flex">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-80" style="max-height:90vh; overflow-y:auto;">
      <h2 class="font-lora text-xl font-bold text-blue-950 mb-1">Editar Flyer</h2>
      <p id="form-event-label" class="text-blue-600 text-xs font-semibold mb-4"></p>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Título (Español)</label>
          <input id="f-title" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Título (Inglés)</label>
          <input id="f-title-en" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Subtítulo (Español)</label>
          <input id="f-subtitle" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Subtítulo (Inglés)</label>
          <input id="f-subtitle-en" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Próxima Fecha</label>
          <input id="f-date" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p class="text-gray-400 text-xs mt-1">El tab cambia automáticamente según el día (Mar/Vie/Dom)</p>
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button id="btn-form-cancel" class="flex-1 bg-gray-200 text-gray-700 rounded-lg py-2 text-sm">Cancelar</button>
        <button id="btn-form-save" class="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm font-semibold">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const PASS = '1234';
    let isEnglish = false;
    let currentDay = 'martes';

    // Horarios fijos por tipo de evento (siempre iguales, no se editan)
    const schedules = {
      martes: [
        { es: 'Oración',         en: 'Prayer',        time: '7:00 – 8:00 PM' },
        { es: 'Estudio Bíblico', en: 'Bible Study',   time: '8:00 – 9:00 PM' }
      ],
      viernes: [
        { es: 'Servicio General', en: 'General Service', time: '7:00 – 9:00 PM' }
      ],
      domingo: [
        { es: 'Servicio Dominical', en: 'Sunday Service', time: '10:00 AM' }
      ]
    };

    // Imagen por tipo de evento
    const images = {
      martes:  'https://pablotorre2025.github.io/clc-clases/assets/f1.jpeg',
      viernes: 'https://pablotorre2025.github.io/clc-clases/assets/f2.jpeg',
      domingo: 'https://pablotorre2025.github.io/clc-clases/assets/f3.jpeg'
    };

    // Títulos por defecto si el usuario no ha personalizado
    const defaultTitles = {
      martes:  { es: 'Oración & Estudio Bíblico', en: 'Prayer & Bible Study' },
      viernes: { es: 'Servicio General',           en: 'General Service' },
      domingo: { es: 'Servicio Dominical',         en: 'Sunday Service' }
    };

    const dayLabels = { martes: 'Martes', viernes: 'Viernes', domingo: 'Domingo' };
    const ADDRESS_TEXT = '404 W. Wilshire Avenue; Fullerton, CA 92832';
    const MAPS_URL = 'https://www.google.com/maps/search/?api=1&query=404%20W.%20Wilshire%20Avenue%2C%20Fullerton%2C%20CA%2092832';

    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyAfaHoUOtRoVyYLVD128NfrBpIPC-x8RVw',
      authDomain: 'clc-clases.firebaseapp.com',
      databaseURL: 'https://clc-clases-default-rtdb.firebaseio.com',
      projectId: 'clc-clases',
      storageBucket: 'clc-clases.firebasestorage.app',
      messagingSenderId: '74056773519',
      appId: '1:74056773519:web:871dc95bb400db490025fa'
    };
    const firebaseEnabled = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== '<TU_API_KEY>';

    const defaultEventData = {
      title: '', titleEn: '', subtitle: '', subtitleEn: '', date: '', dateEn: '', dateISO: ''
    };

    let eventData = {
      martes:  { ...defaultEventData },
      viernes: { ...defaultEventData },
      domingo: { ...defaultEventData }
    };

    let firebaseApp = null;
    let firebaseDatabase = null;

    function initFirebase() {
      if (!firebaseEnabled) {
        console.warn('Firebase no está configurado correctamente.');
        return false;
      }
      if (typeof firebase === 'undefined') {
        console.warn('Firebase no cargó. Verifica los scripts importados.');
        return false;
      }
      try {
        if (firebase.apps && firebase.apps.length > 0) {
          firebaseApp = firebase.app();
        } else {
          firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
        }
        firebaseDatabase = firebase.database();
        return true;
      } catch (err) {
        console.warn('Firebase no inicializado:', err);
        console.warn('Error inicializando Firebase: ' + err.message);
        return false;
      }
    }

    function loadLocalData() {
      let saved = {};
      try {
        saved = JSON.parse(localStorage.getItem('eventData') || '{}');
      } catch (err) {
        saved = {};
      }
      eventData = {
        martes:  { ...defaultEventData, ...(saved.martes || {}) },
        viernes: { ...defaultEventData, ...(saved.viernes || {}) },
        domingo: { ...defaultEventData, ...(saved.domingo || {}) }
      };
    }

    async function loadFirebaseData() {
      if (!initFirebase()) return false;
      try {
        const snapshot = await firebaseDatabase.ref('/flyerData').once('value');
        const json = snapshot.val();
        if (!json) {
          console.warn('Firebase conectado, pero no hay datos en /flyerData.');
          return false;
        }
        eventData = {
          martes:  { ...defaultEventData, ...(json.martes || {}) },
          viernes: { ...defaultEventData, ...(json.viernes || {}) },
          domingo: { ...defaultEventData, ...(json.domingo || {}) }
        };
        return true;
      } catch (err) {
        console.warn('Error cargando datos de Firebase:', err);
        console.warn('Error cargando Firebase: ' + err.message);
        return false;
      }
    }

    function saveLocalData() {
      localStorage.setItem('eventData', JSON.stringify(eventData));
    }

    async function saveFirebaseData() {
      if (!firebaseEnabled || !initFirebase()) return false;
      try {
        await firebaseDatabase.ref('/flyerData').set(eventData);
        return true;
      } catch (err) {
        console.warn('Error guardando datos en Firebase:', err);
        console.warn('Error guardando en Firebase: ' + err.message);
        return false;
      }
    }

    function formatDateSpanish(isoDate) {
      const d = new Date(isoDate + 'T12:00:00');
      const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      return days[d.getDay()] + ', ' + d.getDate() + ' de ' + months[d.getMonth()];
    }

    function formatDateEnglish(isoDate) {
      const d = new Date(isoDate + 'T12:00:00');
      const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
    }

    function renderSchedule() {
      const container = document.getElementById('schedule-container');
      container.innerHTML = schedules[currentDay].map(item => `
        <div class="flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
          </svg>
          <span class="ml-3 text-gray-700 text-lg font-medium">
            <span class="font-semibold text-blue-800">${isEnglish ? item.en : item.es}</span>: ${item.time}
          </span>
        </div>
      `).join('');
    }

    function getTabLabel(day) {
      const d = eventData[day];
      const dateText = isEnglish ? d.dateEn : d.date;
      if (!dateText) return dayLabels[day];
      return `${dayLabels[day]}<span class="block text-[10px] font-normal leading-tight">${dateText}</span>`;
    }

    function renderFlyer() {
      const d   = eventData[currentDay];
      const def = defaultTitles[currentDay];

      document.getElementById('flyer-image').src = images[currentDay];
      document.getElementById('flyer-image').dataset.day = currentDay;
      document.getElementById('flyer-image').alt = `Flyer ${dayLabels[currentDay]}`;
      const title = isEnglish ? (d.titleEn || def.en) : (d.title || def.es);
      document.getElementById('flyer-title').innerHTML   = title.replace(/\n/g, '<br>');
      document.getElementById('flyer-subtitle').textContent = isEnglish ? (d.subtitleEn || '') : (d.subtitle || '');
      const dateText = isEnglish ? d.dateEn : d.date;
      document.getElementById('flyer-date').textContent = dateText || (isEnglish ? 'Date not set' : 'Fecha no definida');
      document.getElementById('flyer-address').textContent = ADDRESS_TEXT;
      document.getElementById('directions-link').href = MAPS_URL;
      document.getElementById('hero-overlay-button').textContent = isEnglish ? 'View full image' : 'Ver imagen completa';
      document.getElementById('hero-overlay-button').style.display = currentDay === 'martes' ? 'block' : 'none';
      document.getElementById('flyer-button').textContent   = isEnglish ? 'Go to Class Now' : 'Ir a la Clase ahora';
      document.getElementById('flyer-button').style.display = currentDay === 'martes' ? 'block' : 'none';

      renderSchedule();

      document.querySelectorAll('.day-tab').forEach(btn => {
        const active = btn.dataset.day === currentDay;
        btn.className = `day-tab flex-1 py-1.5 rounded-full text-sm font-semibold transition-all ${active ? 'bg-blue-700 text-white' : 'bg-gray-200 text-gray-600'}`;
        btn.innerHTML = getTabLabel(btn.dataset.day);
      });
    }

    // Tabs de día
    document.querySelectorAll('.day-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        currentDay = btn.dataset.day;
        renderFlyer();
      });
    });

    function openFullImage() {
      window.open(images[currentDay], '_blank', 'noopener');
    }

    document.getElementById('flyer-image').addEventListener('click', openFullImage);
    document.getElementById('hero-overlay-button').addEventListener('click', openFullImage);

    async function initFlyer() {
      let loadedFromFirebase = false;
      if (firebaseEnabled) {
        loadedFromFirebase = await loadFirebaseData();
      }
      if (!loadedFromFirebase) {
        loadLocalData();
        console.warn('No se pudo cargar Firebase; usando datos locales.');
      }
      renderFlyer();
    }

    initFlyer();

    // Evitar mostrar contenido antiguo desde cache de página
    window.addEventListener('pageshow', event => {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // Cambio de idioma
    document.getElementById('language-switch').addEventListener('click', () => {
      isEnglish = !isEnglish;
      document.getElementById('language-switch').textContent = isEnglish ? 'ES / EN' : 'EN / ES';
      document.documentElement.lang = isEnglish ? 'en' : 'es';
      renderFlyer();
    });

    // Fallback imagen
    document.getElementById('flyer-image').addEventListener('error', function() {
      this.src = 'https://placehold.co/800x600/1e3a5f/ffffff?text=Academia+Biblica';
    });

    // --- Flujo de edición con contraseña ---
    const modalPw   = document.getElementById('modal-password');
    const modalForm = document.getElementById('modal-form');

    document.getElementById('btn-edit').addEventListener('click', () => {
      document.getElementById('input-password').value = '';
      document.getElementById('pw-error').style.display = 'none';
      modalPw.style.display = 'flex';
    });

    document.getElementById('btn-pw-cancel').addEventListener('click', () => {
      modalPw.style.display = 'none';
    });

    document.getElementById('btn-pw-ok').addEventListener('click', () => {
      const pw = document.getElementById('input-password').value;
      if (pw === PASS) {
        modalPw.style.display = 'none';
        const d = eventData[currentDay];
        const dayLabels = { martes: 'Martes', viernes: 'Viernes', domingo: 'Domingo' };
        document.getElementById('form-event-label').textContent = 'Editando: ' + dayLabels[currentDay];
        document.getElementById('f-title').value       = d.title;
        document.getElementById('f-title-en').value    = d.titleEn;
        document.getElementById('f-subtitle').value    = d.subtitle;
        document.getElementById('f-subtitle-en').value = d.subtitleEn;
        document.getElementById('f-date').value        = d.dateISO || '';
        modalForm.style.display = 'flex';
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    });

    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-pw-ok').click();
    });

    document.getElementById('btn-form-cancel').addEventListener('click', () => {
      modalForm.style.display = 'none';
    });

    document.getElementById('btn-form-save').addEventListener('click', async () => {
      const pickedDate = document.getElementById('f-date').value;
      const fTitle      = document.getElementById('f-title').value.trim();
      const fTitleEn    = document.getElementById('f-title-en').value.trim();
      const fSubtitle   = document.getElementById('f-subtitle').value.trim();
      const fSubtitleEn = document.getElementById('f-subtitle-en').value.trim();

      // Opción C: detectar día automáticamente y cambiar tab
      if (pickedDate) {
        const dow = new Date(pickedDate + 'T12:00:00').getDay();
        if      (dow === 2) currentDay = 'martes';
        else if (dow === 5) currentDay = 'viernes';
        else if (dow === 0) currentDay = 'domingo';
      }

      const d = eventData[currentDay];
      d.title      = fTitle      || d.title;
      d.titleEn    = fTitleEn    || d.titleEn;
      d.subtitle   = fSubtitle   || d.subtitle;
      d.subtitleEn = fSubtitleEn || d.subtitleEn;

      if (pickedDate) {
        d.dateISO = pickedDate;
        d.date    = formatDateSpanish(pickedDate);
        d.dateEn  = formatDateEnglish(pickedDate);
      }

      const firebaseSaved = await saveFirebaseData();
      saveLocalData();
      if (firebaseEnabled && !firebaseSaved) {
        console.warn('No se pudo guardar en Firebase. Los datos se guardaron localmente.');
      }

      modalForm.style.display = 'none';
      isEnglish = false;
      document.getElementById('language-switch').textContent = 'EN / ES';
      renderFlyer();
    });

    // Ctrl+E para mostrar/ocultar botón de edición
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'e') {
        const btn = document.getElementById('btn-edit');
        btn.style.opacity = btn.style.opacity === '0.6' ? '0.15' : '0.6';
      }
    });
  </script>
</body>
</html>
