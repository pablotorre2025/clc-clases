<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Digital - Clase Bíblica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    .font-lora { font-family: 'Lora', serif; }
  </style>
</head>
<body class="bg-gray-100" style="height:100vh; display:flex; flex-direction:column;">

  <!-- Botón de idioma -->
  <div class="fixed top-4 right-4 z-20">
    <button id="language-switch" class="bg-white/80 backdrop-blur text-blue-900 text-sm font-semibold px-3 py-1 rounded-full shadow">
      EN / ES
    </button>
  </div>

  <!-- SECCIÓN IMAGEN (60% de la pantalla) -->
  <div class="relative" style="flex: 0 0 60vh; overflow:hidden;">
    <img id="flyer-image"
         src="https://pablotorre2025.github.io/clc-clases/assets/f1.png"
         alt="Clase Bíblica"
         style="width:100%; height:100%; object-fit:cover; display:block;">
    <!-- Gradiente oscuro en la parte inferior de la imagen -->
    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);"></div>
  </div>

  <!-- SECCIÓN INFORMACIÓN (40% de la pantalla) -->
  <div class="flex flex-col justify-center px-8 py-6 bg-gray-100" style="flex: 1;">

    <!-- Título -->
    <h1 id="flyer-title" class="font-lora text-3xl font-bold text-blue-950 mb-5">
      Clase Bíblica<br>Semanal
    </h1>

    <!-- Fecha -->
    <div class="flex items-center mb-3">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
      </svg>
      <span id="flyer-date" class="ml-3 text-gray-700 text-base font-medium">Martes, 9 de Mayo</span>
    </div>

    <!-- Hora -->
    <div class="flex items-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
      </svg>
      <span id="flyer-time" class="ml-3 text-gray-700 text-base font-medium">7:00 PM</span>
    </div>

    <!-- Botón -->
    <a id="flyer-button" href="#"
       class="block text-center bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-6 rounded-2xl text-base shadow-md active:scale-95 transition-all">
      Ir a la Clase ahora
    </a>
  </div>

  <script>
    let isEnglish = false;
    document.getElementById('language-switch').addEventListener('click', () => {
      isEnglish = !isEnglish;
      document.getElementById('language-switch').textContent = isEnglish ? 'ES / EN' : 'EN / ES';
      document.getElementById('flyer-title').innerHTML = isEnglish ? 'Weekly<br>Bible Class' : 'Clase Bíblica<br>Semanal';
      document.getElementById('flyer-date').textContent = isEnglish ? 'Tuesday, May 9th' : 'Martes, 9 de Mayo';
      document.getElementById('flyer-button').textContent = isEnglish ? 'Go to Class Now' : 'Ir a la Clase ahora';
      document.documentElement.lang = isEnglish ? 'en' : 'es';
    });

    document.getElementById('flyer-image').addEventListener('error', function() {
      this.src = 'https://placehold.co/800x600/1e3a5f/ffffff?text=Clase+Biblica';
    });
  </script>
</body>
</html>
