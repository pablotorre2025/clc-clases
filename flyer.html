<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Digital - Clase Bíblica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: sans-serif; }
    .font-lora { font-family: 'Lora', serif; }
  </style>
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center p-4">

  <!-- Botón de idioma -->
  <div class="fixed top-4 right-4 z-10">
    <button id="language-switch" class="bg-blue-700 hover:bg-blue-800 text-white text-sm px-3 py-1 rounded-full shadow">
      EN / ES
    </button>
  </div>

  <!-- Tarjeta del flyer -->
  <div class="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-sm">

    <!-- Imagen de cabecera -->
    <div class="relative w-full" style="height: 220px;">
      <img id="flyer-image"
           src="https://pablotorre2025.github.io/clc-clases/assets/f1.png"
           alt="Clase Bíblica"
           style="width:100%; height:100%; object-fit:cover; display:block;">
      <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);"></div>
      <h1 id="flyer-title" class="font-lora absolute bottom-3 left-4 text-white text-xl font-bold">Clase Bíblica Semanal</h1>
    </div>

    <!-- Información -->
    <div class="p-6">

      <!-- Fecha -->
      <div class="flex items-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:22px;height:22px;color:#1d4ed8;flex-shrink:0;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        <span id="flyer-date" class="ml-2 text-gray-700 text-base">Martes, 9 de Mayo</span>
      </div>

      <!-- Hora -->
      <div class="flex items-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:22px;height:22px;color:#1d4ed8;flex-shrink:0;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
        </svg>
        <span id="flyer-time" class="ml-2 text-gray-700 text-base">7:00 PM</span>
      </div>

      <!-- Botón de acción -->
      <a id="flyer-button" href="#"
         class="block text-center bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-xl transition-all active:scale-95">
        Ir a la Clase ahora
      </a>
    </div>
  </div>

  <script>
    // Cambio de idioma
    let isEnglish = false;
    document.getElementById('language-switch').addEventListener('click', () => {
      isEnglish = !isEnglish;
      document.getElementById('language-switch').textContent = isEnglish ? 'ES / EN' : 'EN / ES';
      document.getElementById('flyer-title').textContent = isEnglish ? 'Weekly Bible Class' : 'Clase Bíblica Semanal';
      document.getElementById('flyer-date').textContent = isEnglish ? 'Tuesday, May 9th' : 'Martes, 9 de Mayo';
      document.getElementById('flyer-time').textContent = isEnglish ? '7:00 PM' : '7:00 PM';
      document.getElementById('flyer-button').textContent = isEnglish ? 'Go to Class Now' : 'Ir a la Clase ahora';
      document.documentElement.lang = isEnglish ? 'en' : 'es';
    });

    // Fallback si la imagen no carga
    document.getElementById('flyer-image').addEventListener('error', function() {
      this.src = 'https://placehold.co/400x220/1e3a5f/ffffff?text=Clase+Biblica';
    });
  </script>
</body>
</html>
