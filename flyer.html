<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Digital - Clase Bíblica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    .font-lora { font-family: 'Lora', serif; }
    #btn-edit {
      position: fixed;
      top: 0;
      left: 0;
      opacity: 0.1;
      z-index: 10;
      transition: opacity 0.3s;
    }
    #btn-edit:hover {
      opacity: 0.5;
    }
  </style>
</head>
<body class="bg-gray-100" style="height:100vh; display:flex; flex-direction:column;">

  <!-- Botón de idioma -->
  <div class="fixed top-4 right-4 z-20">
    <button id="language-switch" class="bg-white/80 backdrop-blur text-blue-900 text-sm font-semibold px-3 py-1 rounded-full shadow">
      EN / ES
    </button>
  </div>

  <!-- Botón de edición (esquina inferior derecha) -->
  <div class="fixed bottom-5 right-5 z-20">
    <button id="btn-edit" class="bg-blue-800 text-white text-xs px-3 py-2 rounded-full shadow-lg">✏️ Editar</button>
  </div>

  <!-- SECCIÓN IMAGEN (60% de la pantalla) -->
  <div class="relative" style="flex: 0 0 60vh; overflow:hidden;">
    <img id="flyer-image"
         src="https://pablotorre2025.github.io/clc-clases/assets/f1.png"
         alt="Clase Bíblica"
         style="width:100%; height:100%; object-fit:cover; display:block;">
    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);"></div>
  </div>

  <!-- SECCIÓN INFORMACIÓN (40% de la pantalla) -->
  <div class="flex flex-col justify-center px-8 py-6 bg-gray-100" style="flex: 1;">
    <h1 id="flyer-title" class="font-lora text-3xl font-bold text-blue-950 mb-5">
      Clase Bíblica<br>Semanal
    </h1>
    <div class="flex items-center mb-3">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
      </svg>
      <span id="flyer-date" class="ml-3 text-gray-700 text-base font-medium">Martes, 9 de Mayo</span>
    </div>
    <div class="flex items-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#1d4ed8" style="width:20px;height:20px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
      </svg>
      <span id="flyer-time" class="ml-3 text-gray-700 text-base font-medium">7:00 PM</span>
    </div>
    <a id="flyer-button" href="#"
       class="block text-center bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-6 rounded-2xl text-base shadow-md active:scale-95 transition-all">
      Lección 1 — Ir a la Clase ahora
    </a>
  </div>

  <!-- MODAL: Contraseña -->
  <div id="modal-password" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center;" class="flex">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-80">
      <h2 class="font-lora text-xl font-bold text-blue-950 mb-4">Acceso de edición</h2>
      <input id="input-password" type="password" placeholder="Contraseña"
             class="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-800 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p id="pw-error" class="text-red-500 text-sm mb-3" style="display:none;">Contraseña incorrecta</p>
      <div class="flex gap-2">
        <button id="btn-pw-cancel" class="flex-1 bg-gray-200 text-gray-700 rounded-lg py-2 text-sm">Cancelar</button>
        <button id="btn-pw-ok" class="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm font-semibold">Entrar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Formulario de edición -->
  <div id="modal-form" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center;" class="flex">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-80">
      <h2 class="font-lora text-xl font-bold text-blue-950 mb-4">Editar Flyer</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Título</label>
          <input id="f-title" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Número de Lección</label>
          <input id="f-lesson" type="number" min="1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: 1">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Fecha</label>
          <input id="f-date" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: Martes, 9 de Mayo">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Hora</label>
          <input id="f-time" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: 7:00 PM">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Enlace del botón (URL)</label>
          <input id="f-link" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://...">
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button id="btn-form-cancel" class="flex-1 bg-gray-200 text-gray-700 rounded-lg py-2 text-sm">Cancelar</button>
        <button id="btn-form-save" class="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm font-semibold">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const PASS = '1234';

    // Datos actuales
    let data = JSON.parse(localStorage.getItem('flyerData')) || {
      title: 'Clase Bíblica Semanal',
      lesson: '1',
      date: 'Martes, 9 de Mayo',
      time: '7:00 PM',
      link: '#'
    };

    function renderFlyer() {
      document.getElementById('flyer-title').innerHTML = data.title.replace(/\n/g, '<br>');
      document.getElementById('flyer-date').textContent = data.date;
      document.getElementById('flyer-time').textContent = data.time;
      document.getElementById('flyer-button').href = `index.html?lesson=${data.lesson}`;
      document.getElementById('flyer-button').textContent = 'Ir a la Clase ahora';
    }

    renderFlyer();

    // Cambio de idioma
    let isEnglish = false;
    document.getElementById('language-switch').addEventListener('click', () => {
      isEnglish = !isEnglish;
      document.getElementById('language-switch').textContent = isEnglish ? 'ES / EN' : 'EN / ES';
      if (isEnglish) {
        document.getElementById('flyer-button').textContent = 'Go to Class Now';
      } else {
        document.getElementById('flyer-button').textContent = 'Ir a la Clase ahora';
      }
      document.documentElement.lang = isEnglish ? 'en' : 'es';
    });

    // Fallback imagen
    document.getElementById('flyer-image').addEventListener('error', function() {
      this.src = 'https://placehold.co/800x600/1e3a5f/ffffff?text=Clase+Biblica';
    });

    // --- Flujo de edición con contraseña ---
    const modalPw = document.getElementById('modal-password');
    const modalForm = document.getElementById('modal-form');

    document.getElementById('btn-edit').addEventListener('click', () => {
      document.getElementById('input-password').value = '';
      document.getElementById('pw-error').style.display = 'none';
      modalPw.style.display = 'flex';
    });

    document.getElementById('btn-pw-cancel').addEventListener('click', () => {
      modalPw.style.display = 'none';
    });

    document.getElementById('btn-pw-ok').addEventListener('click', () => {
      const pw = document.getElementById('input-password').value;
      if (pw === PASS) {
        modalPw.style.display = 'none';
        // Rellenar formulario con datos actuales
        document.getElementById('f-title').value = data.title;
        document.getElementById('f-lesson').value = data.lesson;
        document.getElementById('f-date').value = data.date;
        document.getElementById('f-time').value = data.time;
        document.getElementById('f-link').value = data.link;
        modalForm.style.display = 'flex';
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    });

    // Permitir Enter en el campo de contraseña
    document.getElementById('input-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-pw-ok').click();
    });

    document.getElementById('btn-form-cancel').addEventListener('click', () => {
      modalForm.style.display = 'none';
    });

    document.getElementById('btn-form-save').addEventListener('click', () => {
      data.title  = document.getElementById('f-title').value || data.title;
      data.lesson = document.getElementById('f-lesson').value || data.lesson;
      data.date   = document.getElementById('f-date').value  || data.date;
      data.time   = document.getElementById('f-time').value  || data.time;
      data.link   = document.getElementById('f-link').value  || data.link;
      localStorage.setItem('flyerData', JSON.stringify(data));
      modalForm.style.display = 'none';
      isEnglish = false;
      document.getElementById('language-switch').textContent = 'EN / ES';
      renderFlyer();
    });

    // Add a keyboard shortcut to toggle the visibility of the edit button
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'e') { // Ctrl + E to toggle visibility
        const editButton = document.getElementById('btn-edit');
        editButton.style.opacity = editButton.style.opacity === '0.1' ? '1' : '0.1';
      }
    });
  </script>
</body>
</html>
